name: Auto Update Assets List

on:
  push:
    paths:
      - 'assets/**' # assetsフォルダ内が変わった時だけ実行（節約）
  workflow_dispatch: # ボタンで手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # リポジトリのコードを取得

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate JSON
        run: node scripts/generate-json.js # スキャン用JSを実行

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 差分をステージング（list.jsonも含める）
          git add assets/list.json assets/last_update.txt
          
          # 2. 差分があるかチェック
          if ! git diff --cached --quiet; then
            git commit -m "chore: update assets and timestamp"
            
            # 3. 【最重要】Push直前にリモートの最新を取り込む
            # これで「不一致」を自動で解消して自分の更新を一番上に乗せます
            git pull --rebase origin main
            
            # 4. そしてPush
            git push origin main
          else
            echo "No changes to commit"
          fi