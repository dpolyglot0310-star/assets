name: Auto Update Assets List

on:
  push:
    paths:
      - 'assets/**' # assetsフォルダ内が変わった時だけ実行（節約）
  workflow_dispatch: # ボタンで手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # リポジトリのコードを取得

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate JSON
        run: node scripts/generate-json.js # スキャン用JSを実行

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 現在の時刻をISO形式でファイルに書き込む
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_update.txt
          
          # list.json と last_update.txt の両方をステージング
          git add list.json last_update.txt
          
          # どちらかに差分があればコミットしてPush
          git diff --cached --quiet || (git commit -m "chore: update assets and timestamp" && git push)