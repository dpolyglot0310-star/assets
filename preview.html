<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Unified Asset & Prompt Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="preview-canvas" width="512" height="512" style="border:1px solid #555;"></canvas>

<div class="ui-panel">
    <label>X座標: <input type="range" id="posX" min="0" max="512" value="0"></label><br>
    <label>Y座標: <input type="range" id="posY" min="0" max="512" value="0"></label><br>
    
    <button onclick="mergeToLayer()">配置を確定してベースへ統合</button>
    <button onclick="downloadResult()">最終結果をダウンロード</button>
    
    <hr>
    <p>ベース画像の変更:</p>
    <input type="file" onchange="uploadBaseImage(this.files[0])">
</div>

<script src="js/app.js"></script>
<script src="js/pixel.js"></script>
<script src="./js/preview.js"></script>
</body>
</html>
