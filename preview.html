<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Costume Preview</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
</head>
<body>

<div style="display: flex; gap: 20px; padding: 20px;">
    <div>
        <h3>2D Layout</h3>
        <canvas id="preview-canvas" width="512" height="512" style="border:1px solid #555; background: #333;"></canvas>

        <div class="ui-panel">
            <label>X座標: <input type="range" id="posX" min="0" max="512" value="0"></label><br>
            <label>Y座標: <input type="range" id="posY" min="0" max="512" value="0"></label><br>
            
            <button onclick="mergeToLayer()">配置を確定してベースへ統合</button>
            <button onclick="downloadResult()">最終結果をダウンロード</button>
            
            <hr>
<div class="ui-panel">
    <p>ベース画像を選択:</p>
    <select id="base-selector"></select> 
    
    <hr>
    </div>
            <hr>
            <p>ベース画像の変更:</p>
            <input type="file" onchange="uploadBaseImage(this.files[0])">
        </div>
    </div>

    <div>
        <h3>3D View</h3>
        <div id="3d-container" style="width: 512px; height: 512px; border: 1px solid #555; background: #000;"></div>
    </div>
</div>

<script src="./js/preview.js" defer></script>

</body>
</html>
